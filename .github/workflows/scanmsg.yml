name: ScanMsg

on:
  push:
    paths:
      - .github/workflows/scanmsg.yml
      - data/text/*/*/*.msg
  pull_request:
    paths:
      - .github/workflows/scanmsg.yml
      - data/text/*/*/*.msg

defaults:
  run:
    shell: bash

jobs:
  ScanMsg:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: ScanMsg
        run: ./extra/bin/ScanMsg.exe data/text
