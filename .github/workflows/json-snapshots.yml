name: Binary snapshots
on:
  push:
    branches:
      - master
    paths:
      - "**/*.pro"
      - "**/*.map"

permissions:
    contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: BGforgeNet/BGforge-MLS/actions/binary@d8738e929b435efb3692866787439df96026aeca # actions/binary/v1.0.2
